         // 发送消息
        async function sendMessage(msg) {
            const input = document.getElementById('messageInput');
            const message = msg || input.value.trim();
            if (!message) return;

            // 检查是否选择了文档类型
            if (!selectedDocType) {
                addMessage('请点击下方的「学术论文」或「专利申请」按钮选择文档类型后继续。', false);
                return;
            }

            // 检查输入是否与文档撰写相关
            if (!isDocumentRelated(message)) {
                addMessage('请点击下方的文档类型后继续。', false);
                return;
            }

            input.value = '';
            addMessage(message, true);

              // Disable input and change button to cancel mode (CSS handles icon swap)
              input.disabled = true;
              const sendBtn = document.getElementById('sendBtn');
              sendBtn.classList.add('cancelling');

            // 标记任务开始
            isTaskRunning = true;
            updateSuggestionButtonsState();
            updateNewTaskButtonState();

            // 创建研究任务（可能包含模板）
            const domain = detectDomain(message);
            await createResearchTask(message, selectedDocType, domain);
        }
        
        // 检查消息是否与文档撰写相关
        function isDocumentRelated(message) {
            const lower = message.toLowerCase();
            const keywords = [
                '写', '写一篇', '撰写', '编写', '创建', '生成', '制作',
                '论文', '专利', '学术', '研究', '报告', '提案', '摘要',
                '主题', '关于', '分析', '探讨', '调查', '方法', '系统',
                '算法', '模型', '应用', '技术', '研究', '设计', '实现'
            ];
            return keywords.some(kw => lower.includes(kw));
        }
        
        // 检测领域
        function detectDomain(message) {
            const lower = message.toLowerCase();
            if (lower.includes('医疗') || lower.includes('医学') || lower.includes('诊断') || lower.includes('生物')) {
                return 'BIO';
            } else if (lower.includes('金融') || lower.includes('经济') || lower.includes('银行')) {
                return 'ECON';
            } else if (lower.includes('物理')) {
                return 'PHYS';
            } else if (lower.includes('化学')) {
                return 'CHEM';
            } else if (lower.includes('遥感') || lower.includes('地理') || lower.includes('卫星')) {
                return 'RS';
            } else if (lower.includes('地理') || lower.includes('地质')) {
                return 'GEO';
            }
            return 'CS';
        }
        
        
        
        async function createResearchTask(topic, docType, domain) {
            showTyping();

            try {
                let templateContent = null;

                // 如果用户选择了模板文件，先上传获取内容
                if (selectedTemplateFile) {
                    try {
                        const formData = new FormData();
                        formData.append('file', selectedTemplateFile);

                        const uploadResponse = await fetch(`${API_BASE}/api/research/upload-template`, {
                            method: 'POST',
                            body: formData
                        });

                        if (uploadResponse.ok) {
                            const uploadData = await uploadResponse.json();
                            templateContent = uploadData.template_content;

                            // 清空模板选择状态（不弹窗提示）
                            removeTemplate(false);
                        } else {
                            showToast('模板上传失败，将继续使用默认模板', 'error');
                        }
                    } catch (e) {
                        showToast('模板上传失败，将继续使用默认模板', 'error');
                    }
                }

                const requestBody = {
                    topic: topic,
                    docType: docType,
                    domain: domain
                };

                // 如果有模板内容，添加到请求中
                if (templateContent) {
                    requestBody.templateContent = templateContent;
                }

                const response = await fetch(`${API_BASE}/api/research`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(requestBody)
                });

                const data = await response.json();
                console.log('Task creation response:', response.status, JSON.stringify(data, null, 2));
                console.log('Request body:', JSON.stringify(requestBody));

                if (!response.ok || !data.taskId) {
                    hideTyping();
                    console.error('Task creation failed:', response.status, data);
                    // Show detailed error from validation
                    let errorMsg = '未知错误';
                    if (data.detail && Array.isArray(data.detail)) {
                        errorMsg = data.detail.map(e => `${e.loc?.join('.') || 'field'}: ${e.msg}`).join(', ');
                    } else if (data.message) {
                        errorMsg = data.message;
                    } else if (data.detail) {
                        errorMsg = typeof data.detail === 'string' ? data.detail : JSON.stringify(data.detail);
                    }
                    addMessage(`❌ 创建任务失败：${errorMsg}<br>请确认服务器是否运行。`);
                    const sendBtn = document.getElementById('sendBtn');
                    const input = document.getElementById('messageInput');
                    sendBtn.classList.remove('cancelling');
                    sendBtn.disabled = false;
                    input.disabled = false;
                    input.placeholder = '输入你的研究需求...';
                    currentTaskId = null;
                    isTaskRunning = false;
                    updateSuggestionButtonsState();
                    updateNewTaskButtonState();
                    return;
                }

                currentTaskId = data.taskId;
                
                localStorage.setItem('autoresearch_task_id', currentTaskId);
                localStorage.setItem('autoresearch_doc_type', docType);
                localStorage.setItem('autoresearch_topic', topic);
                
                // Reset dashboard when task is created
                resetDashboard();

                hideTyping();

                let templateInfo = templateContent ? '<br><strong>模板：</strong>已应用自定义模板' : '';
                addMessage(`✅ 任务已创建！<br>
                    <strong>任务ID：</strong>${currentTaskId}<br>
                    <strong>文档类型：</strong>${docType}<br>
                    <strong>领域：</strong>${domain}${templateInfo}<br><br>
                    正在开始研究工作流...`);
                
                // 开始监控进度
                monitorProgress();
                
            } catch (e) {
                hideTyping();
                addMessage(`❌ 创建任务失败：${e.message}<br>请确认服务器是否运行。`);
            }
        }
        
        async function monitorProgress() {
            // Step definitions with node keys for mapping
            const stepDefs = [
                { name: '意图分析', nodeKey: 'intent_analysis' },
                { name: '可行性研究', nodeKey: 'feasibility_study', aliases: ['patent_feasibility', 'paper_feasibility'] },
                { name: '深度研究', nodeKey: 'deep_research', aliases: ['patent_research', 'paper_research'] },
                { name: '撰写初稿', nodeKey: 'drafting', aliases: ['patent_drafting', 'paper_drafting'] },
                { name: '逻辑验证', nodeKey: 'logic_validation', aliases: ['patent_validation', 'paper_validation'] },
                { name: '查重', nodeKey: 'plagiarism_check' },
                { name: '润色', nodeKey: 'polishing' },
                { name: '发布', nodeKey: 'publishing', aliases: ['patent_publishing', 'paper_publishing'] }
            ];
            
            let steps = stepDefs.map(s => ({ ...s, status: '' }));
            let nodeDetails = [];
            let currentNodeIndex = -1;
            
            // Initialize progress display
            showProgress(steps);
            
            // Try SSE connection first
            let sseConnected = false;
            try {
                const sseResponse = await fetch(`${API_BASE}/api/research/${currentTaskId}/stream`);
                if (sseResponse.ok) {
                    const reader = sseResponse.body.getReader();
                    const decoder = new TextDecoder();
                    let buffer = '';
                    
                    // Start polling fallback simultaneously
                    window._pollInterval = setInterval(async () => {
                        if (!currentTaskId) {
                            clearInterval(window._pollInterval);
                            return;
                        }
                        await checkTaskStatus();
                    }, 3000);
                    
                    // SSE reader - 更健壮的解析
                    const readSSE = async () => {
                        while (true) {
                            try {
                                const { done, value } = await reader.read();
                                if (done) break;
                                
                                buffer += decoder.decode(value, { stream: true });
                                const lines = buffer.split('\n');
                                buffer = lines.pop() || '';  // Keep incomplete line in buffer
                                
                                for (const line of lines) {
                                    // Skip empty lines
                                    if (!line || !line.trim()) continue;
                                    
                                    // Handle "data: " prefix
                                    const dataPrefix = 'data: ';
                                    if (line.startsWith(dataPrefix)) {
                                        try {
                                            const jsonStr = line.slice(dataPrefix.length).trim();
                                            if (jsonStr) {  // Skip empty data
                                                const event = JSON.parse(jsonStr);
                                                handleSSEEvent(event);
                                            }
                                        } catch (e) {
                                            console.error('SSE parse error:', e, 'line:', line);
                                        }
                                    }
                                    // Skip other lines (comments, etc.)
                                }
                            } catch (e) {
                                console.error('SSE stream error:', e);
                                break;
                            }
                        }
                    };
                    
                    readSSE().catch(e => {
                        console.log('SSE connection closed');
                        if (window._pollInterval) {
                            clearInterval(window._pollInterval);
                        }
                    });
                    sseConnected = true;
                }
            } catch (e) {
                console.log('SSE not available, using polling');
            }
            
            // If SSE not connected, use polling - 更频繁的轮询
            if (!sseConnected) {
                window._pollInterval = setInterval(async () => {
                    if (!currentTaskId) {
                        clearInterval(window._pollInterval);
                        return;
                    }
                    await checkTaskStatus();
                }, 1500);  // 缩短到1.5秒
            }
            
            async function checkTaskStatus() {
                try {
                    const response = await fetch(`${API_BASE}/api/research/${currentTaskId}`);
                    const data = await response.json();
                    handleTaskUpdate(data);
                } catch (e) {
                    console.error('Monitor error:', e);
                }
            }
            
             function handleSSEEvent(event) {
                 console.log('SSE Event:', event);
                 
                 if (event.event === 'connected') {
                     // Reset dashboard when connected
                     resetDashboard();
                     addMessage('🔗 已连接到实时进度更新', false);
                     return;
                 }
                 
                 if (event.event === 'task_complete') {
                     clearInterval(window._pollInterval);
                     // Update publishing node to completed in dashboard - 直接显示输出路径，不做处理
                     updateDashboard('publishing', 'completed', event.output_path || 'workspace/output');
                     // Update the left workflow display
                     const publishIndex = stepDefs.findIndex(s => s.nodeKey === 'publishing');
                     if (publishIndex !== -1) {
                         // Mark all nodes (including previous ones) as completed
                         for (let i = 0; i <= publishIndex; i++) {
                             if (steps[i].status !== 'completed') {
                                 steps[i].status = 'completed';
                                 updateDashboard(stepDefs[i].nodeKey, 'completed');
                             }
                         }
                         showProgress(steps, 'publishing', nodeDetails);
                     }
                     addMessage(`🎉 任务完成！你的研究文档已经生成。<br><br>
                         <strong>📁 保存路径：</strong>${event.output_path || 'workspace/output'}<br><br>
                         <small>提示：你可以在设置中修改默认保存路径</small>`);
                     // Reset UI state after task completes
                     resetUIAfterTask();
                     currentTaskId = null;
                     return;
                 }
                 
                 if (event.event === 'task_failed') {
                     clearInterval(window._pollInterval);
                     addMessage('❌ 任务失败：' + (event.message || '未知错误'));
                     // Reset UI state after task fails
                     resetUIAfterTask();
                     currentTaskId = null;
                     return;
                 }
                 
                 if (event.event === 'task_stopped') {
                     clearInterval(window._pollInterval);
                     const reason = event.reason || event.message || '任务已停止';
                     addMessage('⛔ ' + reason);
                     addDashboardLog({event: 'task_stopped', node: event.node || 'workflow', message: reason});
                     resetUIAfterTask();
                     currentTaskId = null;
                     return;
                 }
                 
                 // Node events
                 if (event.node && event.message) {
                     console.log('SSE Event received:', event);
                     
                     const nodeIndex = stepDefs.findIndex(s => 
                         s.nodeKey === event.node || (s.aliases && s.aliases.includes(event.node))
                     );
                     if (nodeIndex !== -1) {
                         // Mark previous nodes as completed
                         for (let i = 0; i < nodeIndex; i++) {
                             if (steps[i].status !== 'completed') {
                                 steps[i].status = 'completed';
                                 // Update dashboard for completed nodes
                                 updateDashboard(stepDefs[i].nodeKey, 'completed');
                             }
                         }
                         
                         // Handle node_start vs node_complete events
if (event.event === 'node_start') {
                             // Mark current node as active
                             steps[nodeIndex].status = 'active';
                             currentNodeIndex = nodeIndex;
                             
                             let detailToShow = event.message;
                             if (event.detail) {
                                 detailToShow = event.detail;
                             }
                             
                             const detailTime = new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
                             nodeDetails.unshift(`[${detailTime}] ${event.message}`);
                             if (nodeDetails.length > 4) nodeDetails.pop();
                             
                             showProgress(steps, event.node, nodeDetails);
                             saveUiState();
                             
                             updateDashboard(event.node, 'active', detailToShow);
                             addDashboardLog(event);
                         } else if (event.event === 'node_complete') {
                             // Mark current node as completed
                             steps[nodeIndex].status = 'completed';
                             
                             // Determine the detail to show
                             let detailToShow = event.message;
                             if (event.detail) {
                                 detailToShow = event.detail;
                             }
                             
                             // Add detail
                             const detailTime = new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
                             nodeDetails.unshift(`[${detailTime}] ${event.message}`);
                             if (nodeDetails.length > 4) nodeDetails.pop();
                             
// Update dashboard with completed status
                             updateDashboard(event.node, 'completed', detailToShow);
                             addDashboardLog(event);
                             
                             // Find the NEXT uncompleted node and mark it as active
                             let nextActiveIndex = -1;
                             for (let i = nodeIndex + 1; i < steps.length; i++) {
                                 if (steps[i].status !== 'completed') {
                                     nextActiveIndex = i;
                                     break;
                                 }
                             }
                             
                             // Update left-side workflow display immediately
                             if (nextActiveIndex !== -1) {
                                 // Mark next node as active
                                 steps[nextActiveIndex].status = 'active';
                                 currentNodeIndex = nextActiveIndex;
                                 
                                 // Get the next node's info
                                 const nextNodeKey = steps[nextActiveIndex].nodeKey;
                                 const nextNodeName = steps[nextActiveIndex].name;
                                 const nextNodeDetail = getNodeDetailMessage(nextNodeKey);
                                 
                                 // Add detail for next node
                                 const nextDetailTime = new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
                                 nodeDetails.unshift(`[${nextDetailTime}] 正在执行: ${nextNodeName}`);
                                 if (nodeDetails.length > 4) nodeDetails.pop();
                                 
                                 // Update left side workflow with next node as active
                                 showProgress(steps, nextNodeKey, nodeDetails);
                                 saveUiState();
                                 
                                 // Update right side dashboard with next node as active
                                 updateDashboard(nextNodeKey, 'active', nextNodeDetail);
                                 addDashboardLog({event: 'node_start', node: nextNodeKey, message: `开始执行: ${nextNodeName}`, detail: nextNodeDetail});
                             } else {
                                 // No more nodes, all completed
                                 showProgress(steps, event.node, nodeDetails);
                                 saveUiState();
                             }
                         }
                     }
                 }
             }
            
            function handleTaskUpdate(data) {
                const status = data.status;
                const node = data.currentNode;
                
                if (status === 'COMPLETED') {
                    clearInterval(window._pollInterval);
                    // Update publishing node to completed in dashboard - 直接显示输出路径，不做处理
                    updateDashboard('publishing', 'completed', data.output_path || 'workspace/output');
                    // Update the left workflow display
                    const publishIndex = stepDefs.findIndex(s => s.nodeKey === 'publishing');
                    if (publishIndex !== -1) {
                        // Mark all nodes (including previous ones) as completed
                        for (let i = 0; i <= publishIndex; i++) {
                            if (steps[i].status !== 'completed') {
                                steps[i].status = 'completed';
                                updateDashboard(stepDefs[i].nodeKey, 'completed');
                            }
                        }
                        steps[publishIndex].status = 'completed';
                        showProgress(steps, 'publishing', nodeDetails);
                    }
                    addMessage(`🎉 任务完成！你的研究文档已经生成。<br><br>
                        <strong>📁 保存路径：</strong>${data.output_path || 'workspace/output'}<br><br>
                        <small>提示：你可以在设置中修改默认保存路径</small>`);
                    // Reset UI state after task completes
                    resetUIAfterTask();
                    currentTaskId = null;
                    return;
                }
                
                if (status === 'FAILED') {
                    clearInterval(window._pollInterval);
                    addMessage('❌ 任务失败：' + (data.error_message || '未知错误'));
                    // Reset UI state after task fails
                    resetUIAfterTask();
                    currentTaskId = null;
                    return;
                }
                
                // Update based on current node
                const nodeMap = {
                    'intent_analysis': 0,
                    'feasibility_study': 1,
                    'deep_research': 2,
                    'drafting': 3,
                    'logic_validation': 4,
                    'plagiarism_check': 5,
                    'polishing': 6,
                    'publishing': 7
                };
                
                const newIndex = nodeMap[node] ?? -1;
                
                // Update steps
                if (newIndex !== -1) {
                    // Debug: log the API response
                    console.log('handleTaskUpdate - API response:', JSON.stringify(data));
                    console.log('nodeDetail from API:', data.nodeDetail);
                    
                    // Mark previous as completed
                    for (let i = 0; i < newIndex; i++) {
                        if (steps[i].status !== 'completed') {
                            steps[i].status = 'completed';
                            // Update dashboard for completed nodes
                            updateDashboard(stepDefs[i].nodeKey, 'completed');
                        }
                    }
                    // Mark current as active
                    if (steps[newIndex].status !== 'active') {
                        steps[newIndex].status = 'active';
                        
                        // Get node detail from API response or use default message
                        const nodeDetail = data.nodeDetail || getNodeDetailMessage(node);
                        console.log('Using nodeDetail:', nodeDetail);
                        
                        // Add detail
                        const detailTime = new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
                        nodeDetails.unshift(`[${detailTime}] ${nodeDetail}`);
                        if (nodeDetails.length > 4) nodeDetails.pop();
                        
                        // Update dashboard with current node (use API nodeDetail if available)
                        updateDashboard(node, 'active', nodeDetail);
                    }
                    currentNodeIndex = newIndex;
                }
                
                if (status === 'RUNNING' || status === 'PENDING') {
                    showProgress(steps, node, nodeDetails);
                }
            }
            
            function getNodeDetailMessage(node) {
                const messages = {
                    'intent_analysis': '正在分析研究意图和主题...',
                    'feasibility_study': '正在评估研究可行性...',
                    'deep_research': '正在深度研究相关文献...',
                    'drafting': '正在撰写研究文档初稿...',
                    'logic_validation': '正在进行逻辑验证...',
                    'plagiarism_check': '正在进行查重检测...',
                    'polishing': '正在优化文档内容和格式...',
                    'publishing': '正在保存和发布文档...'
                };
                return messages[node] || '正在处理...';
            }
        }
        
        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }
        
        // Settings functions
        async function showSettings() {
            console.log('showSettings called');
            const modal = document.getElementById('settingsModal');
            modal.classList.add('active');
            
            // Load current settings
            await loadSettings();
            
            // 使用保存的配置加载模型列表（不重新选择，保持当前选中状态）
            await loadModels();
            
            // 恢复连接状态（如果之前有保存的连接状态）
            const cachedSettings = localStorage.getItem('autoresearch_settings');
            const statusEl = document.getElementById('connectionStatus');
            if (cachedSettings) {
                try {
                    const settings = JSON.parse(cachedSettings);
                    if (settings.connectionStatus) {
                        statusEl.className = 'status-indicator ' + settings.connectionStatus;
                        statusEl.title = settings.connectionTitle || '';
                    } else {
                        // Reset connection status
                        statusEl.className = 'status-indicator';
                        statusEl.title = '';
                    }
                } catch (e) {
                    // Reset connection status
                    statusEl.className = 'status-indicator';
                    statusEl.title = '';
                }
            } else {
                // Reset connection status
                statusEl.className = 'status-indicator';
                statusEl.title = '';
            }
        }
        
        let modelsLoaded = false;
        
        async function loadModels() {
            // 如果已经加载过，不再重复加载（避免覆盖用户选择）
            if (modelsLoaded) {
                return;
            }
            
            const modelSelect = document.getElementById('modelName');
            
            // 显示加载状态
            modelSelect.innerHTML = '<option value="">加载中...</option>';
            
            // 获取当前输入的配置（优先使用用户当前输入的值）
            const baseUrl = document.getElementById('modelBaseUrl').value;
            const apiKey = document.getElementById('modelApiKey').value;
            
            try {
                // 构建 URL 参数
                let url = `${API_BASE}/api/settings/models`;
                if (baseUrl && apiKey) {
                    url += `?base_url=${encodeURIComponent(baseUrl)}&api_key=${encodeURIComponent(apiKey)}`;
                }
                
                console.log('Loading models from:', url);
                
                const response = await fetch(url);
                if (response.ok) {
                    const data = await response.json();
                    
                    // 保存当前选中的值（如果有）
                    let selectedValue = modelSelect.value;
                    
                    // 如果当前没有选中，检查是否有保存的模型
                    if (!selectedValue && window._savedModel) {
                        selectedValue = window._savedModel;
                    }
                    
                    // 清空并添加默认选项
                    modelSelect.innerHTML = '<option value="">-- 选择模型 --</option>';
                    
                    // 添加模型列表
                    if (data.models && data.models.length > 0) {
                        console.log('Loaded', data.models.length, 'models');
                        data.models.forEach(m => {
                            const option = document.createElement('option');
                            option.value = m.id;
                            option.textContent = m.name || m.id;
                            modelSelect.appendChild(option);
                        });
                    } else {
                        console.log('No models returned');
                    }
                    
                    // 如果之前已经选中了模型（或有保存的模型），恢复选中状态
                    if (selectedValue && selectedValue !== '加载中...' && selectedValue !== '-- 选择模型 --') {
                        modelSelect.value = selectedValue;
                    }
                    
                    // 清除保存的模型（已应用）
                    window._savedModel = null;
                    
                    modelsLoaded = true;
                }
            } catch (e) {
                console.error('Failed to load models:', e);
                modelSelect.innerHTML = '<option value="">加载失败</option>';
            }
        }
        
        // 刷新模型列表（用于手动刷新）
        async function refreshModels() {
            modelsLoaded = false;
            await loadModels();
        }
        
        function onModelSelectChange() {
            const modelSelect = document.getElementById('modelName');
            console.log('Model selected:', modelSelect.value);
            
            // 用户选择模型后清空连接状态
            document.getElementById('connectionStatus').className = 'status-indicator';
            // 清除保存的连接状态（因为模型已变）
            const cachedSettings = localStorage.getItem('autoresearch_settings');
            if (cachedSettings) {
                try {
                    const settings = JSON.parse(cachedSettings);
                    delete settings.connectionStatus;
                    delete settings.connectionTitle;
                    localStorage.setItem('autoresearch_settings', JSON.stringify(settings));
                } catch (e) {
                    console.error('Failed to clear connection status:', e);
                }
            }
        }
        
        function onApiSettingsChange() {
            // 清空连接状态
            document.getElementById('connectionStatus').className = 'status-indicator';
            // 清除保存的连接状态（因为配置已变）
            const cachedSettings = localStorage.getItem('autoresearch_settings');
            if (cachedSettings) {
                try {
                    const settings = JSON.parse(cachedSettings);
                    delete settings.connectionStatus;
                    delete settings.connectionTitle;
                    localStorage.setItem('autoresearch_settings', JSON.stringify(settings));
                } catch (e) {
                    console.error('Failed to clear connection status:', e);
                }
            }
        }
        
        // 用户点击模型下拉框时加载模型
        function onModelDropdownClick() {
            // 每次点击都尝试加载最新模型
            loadModels();
        }
        
        async function testConnection() {
            const baseUrl = document.getElementById('modelBaseUrl').value;
            const apiKey = document.getElementById('modelApiKey').value;
            const model = document.getElementById('modelName').value;
            const statusEl = document.getElementById('connectionStatus');
            const testBtn = document.querySelector('.test-btn');
            
            if (!baseUrl) {
                alert('请输入 API Base URL');
                return;
            }
            
            if (!apiKey) {
                alert('请输入 API Key');
                return;
            }
            
            if (!model) {
                alert('请选择模型');
                return;
            }
            
            // 显示测试中状态
            testBtn.disabled = true;
            testBtn.textContent = '测试中...';
            statusEl.className = 'status-indicator';
            statusEl.title = '正在测试...';
            
            try {
                const response = await fetch(`${API_BASE}/api/settings/model/test`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        base_url: baseUrl,
                        api_key: apiKey,
                        model: model
                    })
                });
                
                const data = await response.json();
                
                let connectionStatus = 'error';
                let connectionTitle = '连接失败';
                
                if (data.status === 'success') {
                    statusEl.className = 'status-indicator success';
                    connectionStatus = 'success';
                    connectionTitle = `连接正常 (延迟: ${data.latency_ms}ms)`;
                    statusEl.title = connectionTitle;
                } else if (data.status === 'warning') {
                    statusEl.className = 'status-indicator warning';
                    connectionStatus = 'warning';
                    connectionTitle = `延迟较高: ${data.latency_ms}ms`;
                    statusEl.title = connectionTitle;
                } else {
                    statusEl.className = 'status-indicator error';
                    connectionTitle = data.message || '连接失败';
                    statusEl.title = connectionTitle;
                }
                
                // 保存连接状态到 localStorage
                const cachedSettings = localStorage.getItem('autoresearch_settings');
                if (cachedSettings) {
                    try {
                        const settings = JSON.parse(cachedSettings);
                        settings.connectionStatus = connectionStatus;
                        settings.connectionTitle = connectionTitle;
                        localStorage.setItem('autoresearch_settings', JSON.stringify(settings));
                    } catch (e) {
                        console.error('Failed to save connection status:', e);
                    }
                }
                
                // 显示结果消息
                const message = data.message + (data.latency_ms ? ` (${data.latency_ms}ms)` : '');
                alert(`测试结果: ${message}`);
                
            } catch (e) {
                statusEl.className = 'status-indicator error';
                statusEl.title = '测试失败: ' + e.message;
                alert('测试失败: ' + e.message);
                
                // 保存连接失败状态到 localStorage
                const cachedSettings = localStorage.getItem('autoresearch_settings');
                if (cachedSettings) {
                    try {
                        const settings = JSON.parse(cachedSettings);
                        settings.connectionStatus = 'error';
                        settings.connectionTitle = '测试失败: ' + e.message;
                        localStorage.setItem('autoresearch_settings', JSON.stringify(settings));
                    } catch (err) {
                        console.error('Failed to save connection status:', err);
                    }
                }
            } finally {
                testBtn.disabled = false;
                testBtn.textContent = '🔌 测试连接';
            }
        }
        
        function closeSettings() {
            const modal = document.getElementById('settingsModal');
            modal.classList.remove('active');
        }
        
        async function loadSettings() {
            // 首先从 localStorage 加载缓存的设置
            const cachedSettings = localStorage.getItem('autoresearch_settings');
            if (cachedSettings) {
                try {
                    const settings = JSON.parse(cachedSettings);
                    document.getElementById('outputPath').value = settings.outputPath || 'workspace/output';
                    document.getElementById('modelBaseUrl').value = settings.baseUrl || '';
                    // 保存选中的模型，loadModels后应用
                    window._savedModel = settings.model || '';
                    // 保存 API Key 供后续使用
                    window._savedApiKey = settings.apiKey || '';
                    // 如果有 API Key，显示实际值（只对本地存储的 key）
                    if (settings.apiKey) {
                        document.getElementById('modelApiKey').value = settings.apiKey;
                    } else {
                        document.getElementById('modelApiKey').placeholder = '请输入API Key';
                    }
                    console.log('Loaded settings from localStorage:', settings);
                    // 返回继续执行 loadModels
                } catch (e) {
                    console.error('Failed to parse cached settings:', e);
                }
            }
            
            // 如果没有缓存，从后端加载
            try {
                const response = await fetch(`${API_BASE}/api/settings/config`);
                if (response.ok) {
                    const data = await response.json();
                    
                    // Workspace settings
                    if (data.workspace) {
                        document.getElementById('outputPath').value = data.workspace.output_path || 'workspace/output';
                    }
                    
                    // Model settings
                    if (data.model) {
                        document.getElementById('modelBaseUrl').value = data.model.base_url || '';
                        window._savedModel = data.model.model || '';
                        // 后端返回的是 masked key，不要使用它
                        // 只使用 localStorage 中的实际 key（如果存在）
                        // window._savedApiKey 已经在 localStorage 加载时设置了
                    }
                }
            } catch (e) {
                console.error('Failed to load settings:', e);
            }
        }
        
        async function saveSettings() {
            const outputPath = document.getElementById('outputPath').value;
            const baseUrl = document.getElementById('modelBaseUrl').value;
            const apiKey = document.getElementById('modelApiKey').value;
            const modelName = document.getElementById('modelName').value;
            
            // 保留之前保存的 API Key 和连接状态
            const cachedSettings = localStorage.getItem('autoresearch_settings');
            let savedApiKey = '';
            let connectionStatus = '';
            let connectionTitle = '';
            
            if (cachedSettings) {
                try {
                    const settings = JSON.parse(cachedSettings);
                    savedApiKey = settings.apiKey || '';
                    connectionStatus = settings.connectionStatus || '';
                    connectionTitle = settings.connectionTitle || '';
                } catch (e) {
                    console.error('Failed to parse cached settings:', e);
                }
            }
            
            // 如果用户没有输入新 API Key（输入框为空或仍是placeholder），保留之前保存的
            // 只有当用户明确输入了新值时才更新
            const inputValue = document.getElementById('modelApiKey').value;
            // 优先使用 localStorage 的值，其次使用 _savedApiKey
            const fallbackApiKey = savedApiKey || window._savedApiKey || '';
            const finalApiKey = (inputValue && inputValue !== '已配置' && inputValue !== '请输入API Key') ? inputValue : fallbackApiKey;
            
            // 保存到 localStorage（浏览器缓存）
            localStorage.setItem('autoresearch_settings', JSON.stringify({
                outputPath: outputPath,
                baseUrl: baseUrl,
                apiKey: finalApiKey,
                model: modelName,
                connectionStatus: connectionStatus,
                connectionTitle: connectionTitle
            }));
            console.log('Settings saved to localStorage');
            
            try {
                // Save to backend .env file
                await fetch(`${API_BASE}/api/settings/workspace`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ output_path: outputPath })
                });
                
                await fetch(`${API_BASE}/api/settings/model`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        base_url: baseUrl,
                        api_key: finalApiKey,
                        model: modelName
                    })
                });
                
                alert('设置已保存！部分配置需要重启应用后生效。');
                closeSettings();
            } catch (e) {
                alert('保存设置失败：' + e.message);
            }
        }
        
        // Close modal when clicking outside
        document.getElementById('settingsModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeSettings();
            }
        });
    </script>
